<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPACA AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { utama:'#165DFF' } } }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 h-screen flex overflow-hidden">
  <div id="samping" class="samping fixed lg:static w-72 h-full bg-white dark:bg-gray-800 border-r dark:border-gray-700 shadow-lg z-50">
    <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center">
      <h2 class="font-bold text-lg">Menu</h2>
      <button onclick="tutupSamping()" class="lg:hidden text-gray-500 hover:text-red-500"><i class="fa fa-times text-xl"></i></button>
    </div>
    <div class="p-3 h-full overflow-y-auto">
      <button onclick="obrolanBaru()" class="w-full bg-utama text-white py-2.5 rounded-lg mb-4 hover:bg-utama/90 flex items-center justify-center gap-2 transition">
        <i class="fa fa-plus"></i> Obrolan Baru
      </button>
      <div class="mb-4 p-3 bg-gray-100 dark:bg-gray-700/50 rounded-lg">
        <p class="text-sm font-medium mb-2">Warna Latar</p>
        <div class="flex gap-2">
          <button onclick="gantiTema('terang')" class="flex-1 py-2 rounded bg-white dark:bg-gray-600 border dark:border-gray-500 text-sm hover:ring-2 hover:ring-utama transition">
            <i class="fa fa-sun-o mr-1"></i> Putih
          </button>
          <button onclick="gantiTema('gelap')" class="flex-1 py-2 rounded bg-white dark:bg-gray-600 border dark:border-gray-500 text-sm hover:ring-2 hover:ring-utama transition">
            <i class="fa fa-moon-o mr-1"></i> Hitam
          </button>
        </div>
      </div>
      <h3 class="font-semibold mb-2 text-gray-700 dark:text-gray-300"><i class="fa fa-history mr-1"></i> Riwayat</h3>
      <div id="daftarRiwayat" class="space-y-1 mb-6"></div>
      <div class="mt-auto pt-4 border-t dark:border-gray-700 space-y-1">
        <button class="w-full text-left p-2.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-2 transition">
          <i class="fa fa-cog"></i> Pengaturan
        </button>
        <button class="w-full text-left p-2.5 rounded hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-2 transition">
          <i class="fa fa-info-circle"></i> Tentang KPACA
        </button>
        <a href="/logout" class="block w-full text-left p-2.5 rounded hover:bg-red-50 dark:hover:bg-red-900/20 text-red-600 dark:text-red-400 flex items-center gap-2 transition">
          <i class="fa fa-sign-out"></i> Keluar Akun
        </a>
      </div>
    </div>
  </div>
  <div class="flex-1 flex flex-col">
    <header class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 p-3 flex items-center gap-3">
      <button onclick="bukaSamping()" class="text-xl text-gray-700 dark:text-gray-200 hover:text-utama transition">
        <i class="fa fa-bars"></i>
      </button>
      <h1 class="font-bold text-lg">KPACA AI</h1>
    </header>
    <div id="kotakPesan" class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50 dark:bg-gray-900"></div>
    <div class="p-3 border-t dark:border-gray-700 bg-white dark:bg-gray-800">
      <div id="pratinjauGambar" class="hidden mb-2 p-2 bg-gray-50 dark:bg-gray-700 rounded-lg flex items-center gap-2">
        <img id="gambarTampil" class="h-16 w-16 object-cover rounded">
        <span id="namaGambar" class="text-sm flex-1 truncate"></span>
        <button onclick="hapusGambar()" class="text-red-500 hover:text-red-700 text-lg transition">&times;</button>
      </div>
      <form id="formKirim" enctype="multipart/form-data" class="flex gap-2 items-end">
        <label class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer text-gray-600 dark:text-gray-300 transition">
          <input type="file" name="gambar" id="inputGambar" accept="image/*" class="hidden" onchange="pilihGambar(this)">
          <i class="fa fa-picture-o text-xl"></i>
        </label>
        <input type="text" name="pesan" id="inputPesan" placeholder="Tuliskan apa yang ingin kamu tanyakan..." 
          class="flex-1 border dark:border-gray-600 dark:bg-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-utama input-kustom">
        <button type="button" id="tombolSuara" onclick="mulaiRekam()" 
          class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition">
          <i class="fa fa-microphone text-xl"></i>
        </button>
        <button type="submit" class="bg-utama hover:bg-utama/90 text-white px-5 py-2 rounded-lg flex items-center gap-2 transition">
          <i class="fa fa-paper-plane"></i> Kirim
        </button>
      </form>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
